name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # 念のためどちらのブランチ名でも動くように設定

permissions:
  contents: write # gh-pagesブランチへのデプロイ権限

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 18

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # ビルドされたフォルダ
          branch: gh-pages # 公開用のブランチ
          clean: true
